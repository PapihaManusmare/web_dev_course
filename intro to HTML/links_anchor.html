<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links&anchor tag</title>
</head>

<body>
    <a href="https://www.example.com">Visit Example</a><br>
    <!-- Use the target="_blank" attribute to open the link in a new tab.
 -->
    <a href="https://www.google.com" target="_blank">Open Google</a><br>
    <a href="about.html">About Us</a><br>

    <!-- Use the id attribute and a hash ( # ) to jump to a section -->
    <a href="#contact">Go to Contact</a><br>
   
    <h2 id="contact">Contact Section</h2><br>

    <a href="mailto:hello@example.com">Send Email</a><br>

    <a href="tel:+1234567890">Call Us</a>

</body>

</html>
